<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; font-family: sans-serif; }
        #survey-container { position: absolute; width: 100%; height: 100%; z-index: 100; background: white; }
        #dashboard-container { width: 100%; height: 100%; display: none; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="survey-container">
        <iframe id="surveyFrame" 
            src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar">
        </iframe>
    </div>

    <div id="dashboard-container">
        <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
    </div>

    <script>
        var frame = document.getElementById('surveyFrame');
        var surveyContainer = document.getElementById('survey-container');
        var dashContainer = document.getElementById('dashboard-container');
        var loadedCount = 0;

        // TÉCNICA KAMIKAZE: Detección por cambio de carga
        frame.onload = function() {
            loadedCount++;
            console.log("Iframe cargado: " + loadedCount);

            // La primera vez carga el Survey normal (loadedCount = 1)
            // La segunda vez es cuando el Survey hace el Redirect al darle "Enviar"
            if (loadedCount > 1) {
                console.log("¡Envío detectado por redirección!");
                surveyContainer.style.display = 'none';
                dashContainer.style.display = 'block';
            }
        };
    </script>
</body>
</html>
