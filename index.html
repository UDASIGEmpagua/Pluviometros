<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; font-family: sans-serif; }
        #main-container { display: flex; width: 100%; height: 100%; flex-wrap: wrap; }
        
        /* Survey */
        #survey-panel { width: 450px; height: 100%; border-right: 2px solid #007ac2; background: white; z-index: 5; }
        @media (max-width: 800px) { #survey-panel { width: 100%; height: 50%; border-right: none; } }

        /* Dashboard */
        #dashboard-panel { flex-grow: 1; height: 100%; position: relative; }
        @media (max-width: 800px) { #dashboard-panel { height: 50%; } }

        /* Capa de Bloqueo */
        #dashboard-lock { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(230, 230, 230, 0.98); z-index: 10; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; padding: 20px;
        }

        /* Botón que aparecerá después de enviar */
        #btn-unlock { 
            display: none; /* Oculto al principio */
            background: #28a745; color: white; border: none; padding: 20px 40px; 
            font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="survey-panel">
            <iframe id="surveyFrame" src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar"></iframe>
        </div>

        <div id="dashboard-panel">
            <div id="dashboard-lock" id="lockScreen">
                <div id="lock-message">
                    <h2 style="color: #555;">🔒 Tablero Restringido</h2>
                    <p style="color: #777;">Complete el registro de la izquierda para habilitar la visualización.</p>
                </div>
                
                <button id="btn-unlock" onclick="quitarCapa()">✅ ¡REGISTRO COMPLETO!<br>Haga clic para ver Tablero</button>
            </div>
            <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
        </div>
    </div>

    <script>
        function quitarCapa() {
            document.getElementById('dashboard-lock').style.display = 'none';
        }

        window.addEventListener('message', function(e) {
            if (e.data) {
                try {
                    var data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
                    
                    // Si el survey avisa que se envió:
                    if (data.event === 'survey123:onFormSubmitted' || data.method === 'onFormSubmitted') {
                        // 1. Ocultamos el mensaje de "restringido"
                        document.getElementById('lock-message').style.display = 'none';
                        // 2. Mostramos el botón verde de "Ver Tablero"
                        document.getElementById('btn-unlock').style.display = 'block';
                    }
                } catch (err) {}
            }
        });
    </script>
</body>
</html>
