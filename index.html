<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; font-family: sans-serif; }
        #main-container { display: flex; width: 100%; height: 100%; flex-wrap: wrap; }
        #survey-panel { width: 450px; height: 100%; border-right: 2px solid #007ac2; background: white; z-index: 5; }
        @media (max-width: 800px) { #survey-panel { width: 100%; height: 50%; border-right: none; } }
        #dashboard-panel { flex-grow: 1; height: 100%; position: relative; }
        @media (max-width: 800px) { #dashboard-panel { height: 50%; } }

        /* Capa de Bloqueo */
        #dashboard-lock { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(230, 230, 230, 0.98); z-index: 10; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; padding: 20px;
        }

        /* Botón de Desbloqueo */
        #btn-unlock { 
            display: none; /* Inicia oculto */
            background: #28a745; color: white; border: none; padding: 20px 40px; 
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        iframe { border: none; width: 100%; height: 100%; }
        #timer-msg { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="survey-panel">
            <iframe id="surveyFrame" src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar"></iframe>
        </div>

        <div id="dashboard-panel">
            <div id="dashboard-lock">
                <div id="lock-content">
                    <h2 style="color: #555;">🔒 Visualización Restringida</h2>
                    <p id="instruction-text" style="color: #777;">Por favor, complete su registro a la izquierda para habilitar el tablero.</p>
                    <button id="btn-unlock" onclick="document.getElementById('dashboard-lock').style.display='none'">
                        ✅ REGISTRO ENVIADO - VER TABLERO
                    </button>
                    <p id="timer-msg">El botón de acceso aparecerá en unos segundos...</p>
                </div>
            </div>
            <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
        </div>
    </div>

    <script>
        // Después de 25 segundos, mostramos el botón manualmente
        // Esto ignora si el mensaje del Iframe llega o no
        setTimeout(function() {
            document.getElementById('btn-unlock').style.display = 'block';
            document.getElementById('timer-msg').style.display = 'none';
            document.getElementById('instruction-text').innerHTML = "Si ya terminó su registro, presione el botón verde:";
        }, 25000); // 25 segundos
    </script>
</body>
</html>
