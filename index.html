<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; font-family: 'Segoe UI', sans-serif; }
        #main-container { display: flex; width: 100%; height: 100%; flex-wrap: wrap; }
        
        /* Panel del Survey */
        #survey-panel { width: 450px; height: 100%; border-right: 2px solid #007ac2; background: white; z-index: 5; }
        @media (max-width: 800px) { #survey-panel { width: 100%; height: 50%; border-right: none; border-bottom: 2px solid #007ac2; } }

        /* Panel del Dashboard */
        #dashboard-panel { flex-grow: 1; height: 100%; position: relative; min-width: 300px; }
        @media (max-width: 800px) { #dashboard-panel { height: 50%; } }

        /* Capa de Bloqueo */
        #dashboard-lock { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(240, 240, 240, 0.98); z-index: 10; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; color: #555; transition: all 0.6s ease;
        }
        .lock-icon { font-size: 50px; margin-bottom: 15px; }
        
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="survey-panel">
            <iframe id="surveyFrame" src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar"></iframe>
        </div>

        <div id="dashboard-panel">
            <div id="dashboard-lock" id="lockScreen">
                <div class="lock-icon">🔒</div>
                <h2>Visualización Restringida</h2>
                <p>El tablero se activará automáticamente al finalizar <br>el registro de su visita (columna izquierda).</p>
            </div>
            <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
        </div>
    </div>

    <script>
        window.addEventListener('message', function(e) {
            if (e.data) {
                try {
                    var data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
                    // Detectamos el evento de éxito de Survey123
                    if (data.event === 'survey123:onFormSubmitted' || data.method === 'onFormSubmitted') {
                        var lock = document.getElementById('dashboard-lock');
                        lock.style.opacity = '0';
                        setTimeout(function() { lock.style.display = 'none'; }, 600);
                    }
                } catch (err) {}
            }
        });
    </script>
</body>
</html>
