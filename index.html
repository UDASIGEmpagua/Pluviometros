<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #main-container { display: flex; width: 100%; height: 100%; flex-wrap: wrap; }
        
        #survey-panel { width: 460px; height: 100%; border-right: 3px solid #007ac2; background: white; z-index: 5; }
        @media (max-width: 800px) { #survey-panel { width: 100%; height: 60%; border-right: none; } }

        #dashboard-panel { flex-grow: 1; height: 100%; position: relative; }
        @media (max-width: 800px) { #dashboard-panel { height: 40%; } }

        /* Capa de Bloqueo Estilo Carga */
        #dashboard-lock { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.95); z-index: 10; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .loader-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 80%; max-width: 400px; }
        
        /* Reloj de Arena Animado */
        .hourglass {
            display: inline-block; position: relative; width: 50px; height: 50px;
            animation: flip 2s linear infinite; margin-bottom: 20px;
        }
        @keyframes flip {
            0% { transform: rotate(0); } 50% { transform: rotate(180deg); } 100% { transform: rotate(180deg); }
        }
        .hourglass:after {
            content: "⏳"; font-size: 40px;
        }

        /* Barra de progreso */
        .progress-container { width: 100%; background-color: #e0e0e0; border-radius: 10px; margin: 20px 0; height: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background-color: #007ac2; transition: width 0.5s; }

        #btn-unblock { 
            display: none; background: #28a745; color: white; border: none; padding: 18px 30px; 
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }
        
        #status-text { color: #555; font-weight: bold; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="survey-panel">
            <iframe src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar"></iframe>
        </div>

        <div id="dashboard-panel">
            <div id="dashboard-lock">
                <div class="loader-card">
                    <div class="hourglass"></div>
                    <h3 id="status-text">Validando Registro de Visita...</h3>
                    <p style="font-size: 14px; color: #777;">Complete el formulario a su izquierda para habilitar el tablero en tiempo real.</p>
                    
                    <div class="progress-container">
                        <div id="myBar" class="progress-bar"></div>
                    </div>

                    <button id="btn-unblock" onclick="document.getElementById('dashboard-lock').style.display='none'">
                        ✅ REGISTRO CONFIRMADO - ENTRAR
                    </button>
                    <p id="footer-msg" style="font-size: 11px; color: #aaa;">Sincronizando con base de datos SDE...</p>
                </div>
            </div>
            <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
        </div>
    </div>

    <script>
        var i = 0;
        var timeInSeconds = 35; // Tiempo total de espera
        var interval = (timeInSeconds * 1000) / 100;
        
        function move() {
            if (i == 0) {
                i = 1;
                var elem = document.getElementById("myBar");
                var width = 0;
                var id = setInterval(frame, interval);
                function frame() {
                    if (width >= 100) {
                        clearInterval(id);
                        i = 0;
                        // Al terminar, mostramos el botón y cambiamos textos
                        document.getElementById("btn-unblock").style.display = "block";
                        document.getElementById("status-text").innerText = "¡Registro Verificado!";
                        document.getElementById("status-text").style.color = "#28a745";
                        document.querySelector(".hourglass").style.display = "none";
                        document.getElementById("footer-msg").innerText = "Presione el botón para ver los datos.";
                    } else {
                        width++;
                        elem.style.width = width + "%";
                    }
                }
            }
        }
        // Iniciar la barra al cargar
        move();
    </script>
</body>
</html>
