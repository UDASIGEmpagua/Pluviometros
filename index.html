<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; font-family: sans-serif; }
        #main-container { display: flex; width: 100%; height: 100%; flex-wrap: wrap; }
        #survey-panel { width: 460px; height: 100%; border-right: 3px solid #007ac2; background: white; z-index: 5; }
        @media (max-width: 800px) { #survey-panel { width: 100%; height: 60%; border-right: none; } }
        #dashboard-panel { flex-grow: 1; height: 100%; position: relative; }
        @media (max-width: 800px) { #dashboard-panel { height: 40%; } }
        .full-screen { position: fixed !important; top: 0; left: 0; width: 100% !important; height: 100% !important; z-index: 100; }
        #dashboard-lock { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.96); z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .loader-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 400px; }
        .hourglass { display: inline-block; position: relative; width: 60px; height: 60px; animation: flip 2s linear infinite; margin-bottom: 15px; }
        @keyframes flip { 0% { transform: rotate(0); } 50% { transform: rotate(180deg); } 100% { transform: rotate(180deg); } }
        .hourglass:after { content: "⏳"; font-size: 45px; }
        .progress-container { width: 100%; background-color: #eee; border-radius: 10px; margin: 25px 0 10px 0; height: 12px; overflow: hidden; display: none; } 
        .progress-bar { width: 0%; height: 100%; background-color: #007ac2; transition: width 0.5s; }
        #btn-unblock { display: none; background: #28a745; color: white; border: none; padding: 18px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; }
        #status-text { color: #555; font-weight: bold; }
        #sub-text { font-size: 14px; color: #777; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="survey-panel">
            <iframe src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar" allow="geolocation"></iframe>
        </div>

        <div id="dashboard-panel">
            <div id="dashboard-lock">
                <div class="loader-card">
                    <div id="reloj-arena" class="hourglass"></div>
                    <h3 id="status-text">Registro de visita</h3>
                    <p id="sub-text">Por favor, complete el formulario a su izquierda para habilitar el tablero.</p>
                    <div id="p-container" class="progress-container"><div id="myBar" class="progress-bar"></div></div>
                    <button id="btn-unblock" onclick="goFullScreen()">✅ REGISTRO VERIFICADO - ENTRAR</button>
                </div>
            </div>
            <iframe id="dash-iframe" src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f" allow="geolocation"></iframe>
        </div>
    </div>

    <script>
        // 1. Fase Inicial: 50 segundos de espera
        setTimeout(function() {
            // 2. Fase de Carga: Aparece la barra y cambian los textos
            document.getElementById("p-container").style.display = "block";
            document.getElementById("status-text").innerText = "Validando registro de visita...";
            document.getElementById("sub-text").innerText = "Sincronizando datos con el servidor..."; // Quitamos lo de 'complete el formulario'
            
            var elem = document.getElementById("myBar");
            var width = 0;
            // Carga en 10 segundos (100ms * 100 pasos)
            var id = setInterval(function() {
                if (width >= 100) {
                    clearInterval(id);
                    // 3. Fase Final: Aparece el botón
                    document.getElementById("btn-unblock").style.display = "block";
                    document.getElementById("status-text").innerText = "Registro verificado";
                    document.getElementById("status-text").style.color = "#28a745";
                    document.getElementById("sub-text").innerText = "Acceso concedido al tablero de control."; // Texto limpio final
                    document.getElementById("reloj-arena").style.display = "none";
                } else {
                    width++;
                    elem.style.width = width + "%";
                }
            }, 100); 
        }, 50000); 

        function goFullScreen() {
            document.getElementById('dashboard-lock').style.display = 'none';
            document.getElementById('dashboard-panel').classList.add('full-screen');
            document.body.style.overflow = 'hidden';
        }
    </script>
</body>
</html>
