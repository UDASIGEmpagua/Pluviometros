<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; font-family: sans-serif; }
        #survey-container { position: absolute; width: 100%; height: 100%; z-index: 100; background: white; display: flex; flex-direction: column; }
        #dashboard-container { width: 100%; height: 100%; display: none; }
        iframe { border: none; width: 100%; height: 100%; flex-grow: 1; }
        
        /* Botón de auxilio por si el auto-desbloqueo falla */
        .btn-ready { 
            background: #28a745; color: white; border: none; padding: 15px; 
            text-align: center; font-weight: bold; cursor: pointer; display: block;
            width: 100%; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="survey-container">
        <iframe id="surveyFrame" 
            src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar">
        </iframe>
        <button class="btn-ready" onclick="desbloquearTablero()">¿Ya enviaste los datos? Clic aquí para ver Tablero</button>
    </div>

    <div id="dashboard-container">
        <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
    </div>

    <script>
        function desbloquearTablero() {
            console.log("Cambiando a Dashboard...");
            document.getElementById('survey-container').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'block';
        }

        // Intento de detección automática (mantenemos la lógica por si el navegador lo permite)
        window.addEventListener('message', function(e) {
            if (e.data) {
                try {
                    var t = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
                    if (t.event === 'survey123:onFormSubmitted' || t.method === 'onFormSubmitted') {
                        desbloquearTablero();
                    }
                } catch(err) {}
            }
        });
    </script>
</body>
</html>
