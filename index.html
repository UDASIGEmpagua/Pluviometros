<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; }
        #survey-container { position: absolute; width: 100%; height: 100%; z-index: 100; background: white; }
        #dashboard-container { width: 100%; height: 100%; display: none; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="survey-container">
        <iframe id="surveyFrame" 
            src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar">
        </iframe>
    </div>

    <div id="dashboard-container">
        <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
    </div>

    <script>
        function desbloquearTablero() {
            console.log("¡Señal recibida! Cambiando a Dashboard...");
            document.getElementById('survey-container').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'block';
        }

        window.addEventListener('message', function(e) {
            // Survey123 envía varios tipos de eventos, probamos con todos los conocidos
            if (e.data) {
                // Caso 1: El mensaje es un string (JSON)
                if (typeof e.data === 'string') {
                    if (e.data.includes('onFormSubmitted') || e.data.includes('formFinished')) {
                        desbloquearTablero();
                    }
                } 
                // Caso 2: El mensaje ya es un objeto
                else if (e.data.event === 'survey123:onFormSubmitted' || e.data.method === 'onFormSubmitted') {
                    desbloquearTablero();
                }
            }
        }, false);
    </script>
</body>
</html>
