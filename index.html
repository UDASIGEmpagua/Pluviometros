<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #main-container { display: flex; width: 100%; height: 100%; flex-wrap: wrap; }
        
        /* Panel del Survey (Izquierda) */
        #survey-panel { width: 450px; height: 100%; border-right: 2px solid #007ac2; background: white; z-index: 5; }
        @media (max-width: 800px) { #survey-panel { width: 100%; height: 55%; border-right: none; border-bottom: 2px solid #007ac2; } }

        /* Panel del Dashboard (Derecha) */
        #dashboard-panel { flex-grow: 1; height: 100%; position: relative; min-width: 350px; }
        @media (max-width: 800px) { #dashboard-panel { height: 45%; } }

        /* Capa de Acceso */
        #dashboard-lock { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(245, 245, 245, 0.98); z-index: 10; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; padding: 20px; box-sizing: border-box;
        }

        .instruction-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 400px; }
        h2 { color: #007ac2; margin-top: 0; }
        p { color: #666; line-height: 1.5; margin-bottom: 25px; }

        /* El Botón que sí funciona */
        .btn-access { 
            background: #28a745; color: white; border: none; padding: 15px 30px; 
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 6px;
            transition: background 0.3s; text-decoration: none; display: inline-block;
        }
        .btn-access:hover { background: #218838; }
        
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="survey-panel">
            <iframe src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar"></iframe>
        </div>

        <div id="dashboard-panel">
            <div id="dashboard-lock" id="lockScreen">
                <div class="instruction-card">
                    <h2>📊 Acceso al Tablero</h2>
                    <p>Para visualizar los datos pluviométricos en tiempo real, primero debe completar el <b>Registro de Visita</b> en la columna de la izquierda.</p>
                    
                    <button class="btn-access" onclick="document.getElementById('dashboard-lock').style.display='none'">
                        YA ENVIÉ MI REGISTRO →
                    </button>
                    
                    <p style="font-size: 12px; color: #999; margin-top: 15px;">(El tablero se desbloqueará al presionar el botón)</p>
                </div>
            </div>
            
            <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
        </div>
    </div>

</body>
</html>
